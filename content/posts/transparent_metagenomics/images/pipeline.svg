<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 670" role="img" aria-label="Metagenomic sequencing pipeline" style="width:100%;max-width:640px;display:block;margin:0 auto;">
  <defs>
    <marker id="mg-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="var(--site-muted)" />
    </marker>
  </defs>
  <style>
    .mg text { font-family: 'IBM Plex Sans', Arial, sans-serif; }
    .mg-title { fill: var(--site-headline); font-size: 12.5px; font-weight: 600; }
    .mg-detail { fill: var(--site-muted); font-size: 10.5px; }
    .mg-phase-label { font-size: 9px; font-weight: 700; letter-spacing: 0.13em; }
  </style>
  <g class="mg">

    <!-- ── WET LAB ── -->
    <rect x="100" y="10" width="440" height="20" rx="3" fill="#cf7d55" fill-opacity="0.12" stroke="#cf7d55" stroke-width="1"/>
    <text x="320" y="24" text-anchor="middle" class="mg-phase-label" fill="#cf7d55">WET LAB</text>

    <!-- Step 1 -->
    <rect x="100" y="38" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="38" width="5"   height="52" rx="2" fill="#cf7d55"/>
    <text x="120" y="61"  class="mg-title">Sample Collection</text>
    <text x="120" y="79"  class="mg-detail">Stool, tissue, environmental, or clinical specimens</text>
    <line x1="320" y1="90"  x2="320" y2="106" stroke="var(--site-muted)" stroke-width="1.5" marker-end="url(#mg-arrow)"/>

    <!-- Step 2 -->
    <rect x="100" y="108" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="108" width="5"   height="52" rx="2" fill="#cf7d55"/>
    <text x="120" y="131" class="mg-title">DNA / RNA Extraction</text>
    <text x="120" y="149" class="mg-detail">Bead-beating, enzymatic lysis, column purification</text>
    <line x1="320" y1="160" x2="320" y2="176" stroke="var(--site-muted)" stroke-width="1.5" marker-end="url(#mg-arrow)"/>

    <!-- Step 3 -->
    <rect x="100" y="178" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="178" width="5"   height="52" rx="2" fill="#cf7d55"/>
    <text x="120" y="201" class="mg-title">Library Preparation &amp; Sequencing</text>
    <text x="120" y="219" class="mg-detail">Illumina short-read · Nanopore / PacBio long-read</text>
    <line x1="320" y1="230" x2="320" y2="258" stroke="var(--site-muted)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#mg-arrow)"/>

    <!-- ── BIOINFORMATICS ── -->
    <rect x="100" y="260" width="440" height="20" rx="3" fill="#4f8dbf" fill-opacity="0.12" stroke="#4f8dbf" stroke-width="1"/>
    <text x="320" y="274" text-anchor="middle" class="mg-phase-label" fill="#4f8dbf">BIOINFORMATICS PROCESSING</text>

    <!-- Step 4 -->
    <rect x="100" y="288" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="288" width="5"   height="52" rx="2" fill="#4f8dbf"/>
    <text x="120" y="311" class="mg-title">Quality Control</text>
    <text x="120" y="329" class="mg-detail">FastQC · fastp · Trimmomatic · MultiQC</text>
    <line x1="320" y1="340" x2="320" y2="356" stroke="var(--site-muted)" stroke-width="1.5" marker-end="url(#mg-arrow)"/>

    <!-- Step 5 -->
    <rect x="100" y="358" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="358" width="5"   height="52" rx="2" fill="#4f8dbf"/>
    <text x="120" y="381" class="mg-title">Host Read Removal</text>
    <text x="120" y="399" class="mg-detail">Bowtie2 · BWA · KneadData — align reads to host genome</text>
    <line x1="320" y1="410" x2="320" y2="426" stroke="var(--site-muted)" stroke-width="1.5" marker-end="url(#mg-arrow)"/>

    <!-- Step 6 -->
    <rect x="100" y="428" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="428" width="5"   height="52" rx="2" fill="#4f8dbf"/>
    <text x="120" y="451" class="mg-title">Taxonomic Profiling</text>
    <text x="120" y="469" class="mg-detail">MetaPhlAn4 · Kraken2 / Bracken · DIAMOND</text>
    <line x1="320" y1="480" x2="320" y2="496" stroke="var(--site-muted)" stroke-width="1.5" marker-end="url(#mg-arrow)"/>

    <!-- Step 7 -->
    <rect x="100" y="498" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="498" width="5"   height="52" rx="2" fill="#4f8dbf"/>
    <text x="120" y="521" class="mg-title">Functional Annotation</text>
    <text x="120" y="539" class="mg-detail">HUMAnN3 · eggNOG-mapper · PROKKA</text>
    <line x1="320" y1="550" x2="320" y2="578" stroke="var(--site-muted)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#mg-arrow)"/>

    <!-- ── STATISTICAL ANALYSIS ── -->
    <rect x="100" y="580" width="440" height="20" rx="3" fill="#a51c30" fill-opacity="0.12" stroke="#a51c30" stroke-width="1"/>
    <text x="320" y="594" text-anchor="middle" class="mg-phase-label" fill="#a51c30">STATISTICAL ANALYSIS</text>

    <!-- Step 8 -->
    <rect x="100" y="608" width="440" height="52" rx="3" fill="var(--site-surface-soft)" stroke="var(--site-line)" stroke-width="1"/>
    <rect x="100" y="608" width="5"   height="52" rx="2" fill="#a51c30"/>
    <text x="120" y="631" class="mg-title">Diversity &amp; Differential Abundance Analysis</text>
    <text x="120" y="649" class="mg-detail">vegan · MaAsLin3 · ANCOMBC2 · breakaway · radEmu</text>

  </g>
</svg>